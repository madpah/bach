# Sonatype Guide — Agentic Patches (AGP) Workflow
# Learn more: https://guide.sonatype.com
# File: .github/workflows/agp_workflow.yml

name: "Sonatype Guide - Agentic Patches"

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly, Monday 09:00 UTC — adjust as desired
  workflow_dispatch:
    inputs:
      mode:
        description: "AGP run mode"
        type: string
        default: full
      vulnerabilities:
        description: "Optional: restrict run to specific CVEs (comma-separated)"
        type: string
      verbose:
        description: "Enable verbose logging"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write      # Required for OIDC auth

concurrency:
  group: agp-workflow
  cancel-in-progress: false

jobs:
  agp:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # --- Private registry authentication ---------------------------------
      # Uncomment the block matching your ecosystem if you use a private
      # registry. Python (pip-index-url), Maven, and Gradle are configured
      # on the agp-action step below instead of here.
      #
      # - name: Configure .npmrc (Node private registry)
      #   run: echo "${{ secrets.NPMRC_CONTENT }}" > ~/.npmrc

      - name: Run AGP
        uses: sonatype/agp-action@v1
        with:
          mode: ${{ inputs.mode || 'full' }}
          vulnerabilities: ${{ inputs.vulnerabilities }}
          create-pr: 'true'
          dry-run: 'false'
          verbose: ${{ inputs.verbose || 'false' }}

          # Sonatype internal Docker registry — authentication always required.
          docker-registry: sonatype.repo.sonatype.app/docker-all
          docker-username: ${{ secrets.SONATYPE_DOCKER_USERNAME }}
          docker-password: ${{ secrets.SONATYPE_DOCKER_PASSWORD }}

          # --- Ecosystem-specific private registry config ------------------
          # Uncomment only the line(s) that apply to this repo.
          #
          # npmrc-content: ${{ secrets.NPMRC_CONTENT }}
          #
          # maven-settings-xml: |
          #   <settings>
          #     <servers>
          #       <server>
          #         <id>your-registry</id>
          #         <username>${{ secrets.MAVEN_USERNAME }}</username>
          #         <password>${{ secrets.MAVEN_PASSWORD }}</password>
          #       </server>
          #     </servers>
          #   </settings>
          #
          # pip-index-url: https://your-registry.example.com/pypi/simple
          # pip-extra-index-url: https://pypi.org/simple
        env:
          # Guide API base URL.
          AGP_API_URL: https://api.guide.sonatype.com

          GITHUB_TOKEN: ${{ github.token }}
          # GITHUB_TOKEN: ${{ secrets.AGP_GITHUB_TOKEN }}  # PAT alternative
